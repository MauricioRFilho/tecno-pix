<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Tecno Pix</title>
  <link rel="icon" href="/favicon.ico" type="image/svg+xml">
  <style>
    :root {
      --bg: #f3f6fb;
      --ink: #1e293b;
      --primary: #0f62fe;
      --primary-2: #0b4ecc;
      --line: #d7e1ee;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at 20% 20%, #e2ebff 0, transparent 45%), var(--bg);
    }
    .box {
      width: min(760px, calc(100vw - 32px));
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 30px;
      text-align: center;
      box-shadow: 0 14px 36px rgba(25, 50, 90, 0.1);
    }
    .logo {
      width: min(520px, 100%);
      margin: 0 auto 10px;
      display: block;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 26px;
    }
    p {
      margin: 0 0 22px;
      color: #475569;
    }
    .actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    a.btn {
      min-width: 140px;
      text-decoration: none;
      border-radius: 10px;
      height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: #fff;
      background: var(--primary);
    }
    a.btn:hover { background: var(--primary-2); }
  </style>
</head>
<body>
  <main class="box">
    <svg class="logo" viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Tecno Pix">
      <g fill="#e8de5f">
        <circle cx="110" cy="46" r="42"/>
        <path d="M22 82L0 66v48l72 46v114l38-22V138L46 100v-18z"/>
        <path d="M198 82l22-16v48l-72 46v114l-38-22V138l64-38v-18z"/>
      </g>
      <text x="250" y="185" font-family="Verdana, Arial, sans-serif" font-size="148" letter-spacing="10" fill="#e8de5f">TECNOPIX</text>
    </svg>
    <h1>Tecno Pix</h1>
    <p>Escolha como deseja visualizar o projeto.</p>
    <div class="actions">
      <a id="swagger-link" class="btn" href="http://localhost:9500/swagger">Swagger</a>
      <a class="btn" href="/dashboard">Dashboard</a>
    </div>
  </main>
  <script>
    const swaggerLink = document.getElementById('swagger-link');
    if (swaggerLink) {
      swaggerLink.href = `${window.location.protocol}//${window.location.hostname}:9500/swagger`;
    }
  </script>
</body>
</html>
